<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hass-custom harness</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px 12px;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
      }
      #toolbar {
        display: flex;
        gap: 8px;
      }
      #toolbar button {
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        font: inherit;
      }
      #card {
        width: 100%;
        max-width: 400px;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="toggle-dark">Toggle dark</button>
      <button id="reset">Reset</button>
    </div>
    <div id="card"></div>
    <script type="module" src="./harness.ts"></script>
  </body>
</html>
