name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Attach resource to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload hass-custom.js
        uses: softprops/action-gh-release@v2
        with:
          files: hass-custom.js
